name: CC-Content
version: ${project.version}
main: jp.awabi2048.cccontent.CCContent
api-version: '26.1.2'
author: awabi2048
description: Paper 26.1.2用統合コンテンツプラグイン
depend: [CC-System]
softdepend: [HeadDatabase, Vault, MyWorldManager, DeadChest, LuckPerms, FastAsyncWorldEdit, LunaChat]

commands:
  cc-content:
    description: CC-Contentメインコマンド
    usage: /ccc <status|enable|disable|reload|restart|summon|structure|debug|update_day|npc-menu|help>
    aliases: [ccc]
  rank:
    description: ランクシステムコマンド（デバッグ用）
    usage: /rank <subcommand> [args]
    permission: cc-content.admin
  sukima_dungeon:
    description: スキマダンジョンコマンド
    usage: /sukima_dungeon
    aliases: [sd]
    permission: sukimadungeon.command.base
  arenaa:
    description: アリーナ管理コマンド
    usage: /arenaa <menu|lobby|start|stop|license|status|debug>
    permission: cc-content.arena.admin
  rankmenu:
    description: 職業メインメニューを開く
    usage: /rankmenu [skill]
    permission: cc-content.rank
  catalog:
    description: 釣り・料理・醸造の図鑑を開く
    usage: /catalog <fishing|cooking|brewery> [page]
    permission: cc-content.catalog
  cookdex:
    description: 料理図鑑を開く
    usage: /cookdex [page]
    permission: cc-content.catalog
  brewdex:
    description: 醸造図鑑を開く
    usage: /brewdex [page]
    permission: cc-content.catalog
  party:
    description: パーティ管理コマンド
    usage: /party <menu|list|create|info|invite|accept|join|leave|kick|leader|disband|recruit|chat>
    permission: cc-content.party

permissions:
  cccontent.brewery.barrel.create.small:
    description: 小型醸造樽の登録を許可する
    default: true
  cccontent.brewery.barrel.create.large:
    description: 大型醸造樽の登録を許可する
    default: true
  cccontent.brewery.barrel.use:
    description: 醸造樽の利用を許可する
    default: true
  cccontent.brewery.barrel.break:
    description: 登録済み醸造樽の破壊を許可する
    default: true
  cc-content.admin:
    description: CC-Contentの管理コマンドを実行できる
    default: op
    children:
      cc-content.npc.menu.open: true
      cc-content.status: true
      cc-content.enable: true
      cc-content.disable: true
  cc-content.status:
    description: CC-Contentのコンテンツ状態を確認できる
    default: op
  cc-content.enable:
    description: CC-Contentのコンテンツを有効化できる
    default: op
  cc-content.disable:
    description: CC-Contentのコンテンツを無効化できる
    default: op
  cc-content.rank:
    description: 職業メインメニューを開ける
    default: true
  cc-content.fishing:
    description: 釣りとお魚辞典を利用できる
    default: true
  cc-content.catalog:
    description: 釣り・料理・醸造の図鑑を利用できる
    default: true
  cc-content.party:
    description: パーティ機能を利用できる
    default: true
  sukimadungeon.command.base:
    description: Allows using the base command
    default: true
  sukimadungeon.admin:
    description: Admin permissions
    default: op
  cc-content.arena.admin:
    description: アリーナ管理コマンドを実行できる
    default: op
  cc-content.arena.menu.mission:
    description: アリーナミッションメニューを開ける
    default: true
  cc-content.arena.menu.broadcast:
    description: アリーナ実況メニューを開ける
    default: true
  cc-content.arena.menu.pedestal:
    description: アリーナ祭壇メニューを開ける
    default: true
  cc-content.arena.menu.token_exchange:
    description: アリーナのモブドロップ交換メニューを開ける
    default: true
  cc-content.npc.menu.open:
    description: NPCメニューを開ける
    default: op
  cc-content.arena.license.paper:
    description: アリーナ ライセンス paper 段階
    default: false
  cc-content.arena.license.bronze:
    description: アリーナ ライセンス bronze 段階
    default: false
  cc-content.arena.license.silver:
    description: アリーナ ライセンス silver 段階
    default: false
  cc-content.arena.license.gold:
    description: アリーナ ライセンス gold 段階
    default: false
