# 統合言語ファイル（日本語）
# すべてのテキストメッセージはこのファイルで管理

# =========================================
# ランクシステム関連
# =========================================

# 職業情報
profession:
  lumberjack:
    name: 木こり
    description: 木を伐採して経験値を得る職業
  brewer:
    name: 醸造家
    description: ポーション醸造で経験値を得る職業
  miner:
    name: 鉱夫
    description: 鉱石採掘で経験値を得る職業
  cook:
    name: 料理人
    description: 料理を作って経験値を得る職業
  swordsman:
    name: 剣士
    description: モンスター討伐で経験値を得る職業
  warrior:
    name: 戦士
    description: 近接戦闘で経験値を得る職業
  farmer:
    name: 農家
    description: 作物の収穫で経験値を得る職業
  gardener:
    name: 庭師
    description: 装飾的なブロック設置で経験値を得る職業
  carpenter:
    name: 大工
    description: 建築で経験値を得る職業

