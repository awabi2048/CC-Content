sukima_dungeon:
  # SukimaDungeon 日本語言語ファイル
  # 元の SukimaDungeon プラグインの言語ファイルを再現

    # プレフィックス
  prefix: §7[§dスキマダンジョン§7]
  
  # コンパス関連
  compass:
    activate: §bワールドの芽コンパス [Tier %1] を起動しました (§a%2秒§b)
    deactivate: §cコンパスを停止しました
    detected: '§aワールドの芽を検知！ §7距離: §e%1m §7方向: §6%2'
    cooldown: '§cクールダウン中: あと §e%1秒'
    no_sprouts: §c近くにワールドの芽はありません
  
  # タリスマン関連
  talisman:
    use: §6おあげちゃんのお札§7を使用しました
    escape: §d§l脱出！
    cancelled: §c脱出をキャンセルしました
  
