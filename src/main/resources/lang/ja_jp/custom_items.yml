custom_items:
  misc:
    big_light:
      name: §dビッグライト
      lore:
      - §e§n右クリックを長押し§7して、体を大きくすることができます！
      - §e§nShift + 右クリック§7で元の大きさに戻ることができます。
    small_light:
      name: §dスモールライト
      lore:
      - §e§n右クリックを長押し§7して、体を縮ませることができます！
      - §e§nShift + 右クリック§7で元の大きさに戻ることができます。
    auto_ignition_booster:
      name: §6自動点火ブースター
      lore:
      - §7足装備に着用中、§eShift§7で起動します。
      - §7滑空中は花火を1個消費して前方へ加速します。
      - §7非滑空時は同等速度を§a上方向§7へ変換して跳躍します。
    air_cannon:
      name: §b空気砲
      lore:
      - §7右クリックで前方の空間を圧縮して放出します。
      - §7前方の対象を§f前方+上方向§7へ吹き飛ばします。
      - §7使用者も§f後ろ上方§7に小さく反動します。
    invisible_item_frame:
      name: §f透明な額縁
      lore:
      - §7設置すると透明になります。
      - §7手に持って§eスニーク§7中は周囲の透明額縁が見えるようになります。
    invisible_glow_item_frame:
      name: §b透明な光る額縁
      lore:
      - §7設置すると透明になります。
      - §7手に持って§eスニーク§7中は周囲の透明額縁が見えるようになります。
    radio_cassette_player:
      name: §6ラジカセ
      lore:
      - §7右クリックでラジカセメニューを開きます
      - §7カセットを挿入して再生開始すると
      - §7停止するまでループ再生します
    storage_box_single:
      name: §6ストレージボックス(1)
      lore:
      - §7大量のアイテムを格納できます。
      - §7手に持って§eShiftを2回§7でメニューを開きます。
    storage_box_triple:
      name: §6ストレージボックス(3)
      lore:
      - §7最大3種類のアイテムを大量に格納できます。
      - §7手に持って§eShiftを2回§7でメニューを開きます。
      - §7§eShift+スクロール§7で使用対象を切り替えます。
  arena:
