custom_items:
  misc:
    big_light:
      name: §dBig Light
      lore:
      - §e§nHold right click§7 to grow your body!
      - §e§nShift + right click§7 to reset to normal size.
    small_light:
      name: §dSmall Light
      lore:
      - §e§nHold right click§7 to shrink your body!
      - §e§nShift + right click§7 to reset to normal size.
    auto_ignition_booster:
      name: §6Auto Ignition Booster
      lore:
      - §7Activate with §eShift§7 while equipped on feet.
      - §7While gliding, consumes 1 rocket and boosts forward.
      - §7While not gliding, converts equal speed into §aupward§7 boost.
    air_cannon:
      name: §bAir Cannon
      lore:
      - §7Right click to compress and release the air ahead.
      - §7Launches targets in front toward §fforward + upward§7.
      - §7The user also receives a small §fback-upward§7 recoil.
    invisible_item_frame:
      name: §fTransparent Item Frame
      lore:
      - §7Turns invisible after placement.
      - §7Hold it and §eSneak§7 to temporarily reveal nearby transparent frames.
    invisible_glow_item_frame:
      name: §bTransparent Glow Item Frame
      lore:
      - §7Turns invisible after placement.
      - §7Hold it and §eSneak§7 to temporarily reveal nearby transparent frames.
    radio_cassette_player:
      name: §6Radio Cassette
      lore:
      - §7Right click to open the radio menu.
      - §7Insert a cassette and start playback
      - §7to loop until you stop it from the menu.
    storage_box_single:
      name: §6Storage Box (1)
      lore:
      - §7Stores a large amount of items.
      - §7Hold it and press §eShift twice§7 to open the menu.
    storage_box_triple:
      name: §6Storage Box (3)
      lore:
      - §7Stores up to 3 item types in large quantities.
      - §7Hold it and press §eShift twice§7 to open the menu.
      - §7Use §eShift + scroll§7 to change selected item.
