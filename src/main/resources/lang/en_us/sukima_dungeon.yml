  - '&7&m――――――――――――――――――――――――――――――'
  - '&7An amulet given by Oage-chan to protect'
  - '&7crafters sent to the Sukima Dungeon and'
  - '&7to create a way back. Using it inside'
  - '&7the dungeon allows you to &bescape&7.'
  - '&7&m――――――――――――――――――――――――――――――'
  gui_talisman_confirm_title: '&0&lReally escape?'
  gui_talisman_confirm_button: '&c&lEscape'
  gui_talisman_confirm_button_lore:
  - '&7Clicking this will make all players'
  - '&7leave the dungeon midway.'
  - '&c*Items are not lost, but mission fails.'
  gui_talisman_cancel_button: '&a&lStay'
  talisman_cannot_use_here: '&cYou cannot use the talisman here.'
  scoreboard_title: '&eSukima&6Dungeon'
  scoreboard_sprouts: '&f&l| &7World Sprouts &a{count}&7/&a{total}'
  scoreboard_remaining: '&f&l| &7Return in &b{time}'
  oage_intro: '&6Oage-chan: &f"Umm, this is the entrance to Sukima Dungeon. Go defeat monsters and close the world!"'
  oage_result: '&6Oage-chan: &f"Good job! Looks like you successfully cleared it. Here''s your reward!"'
  oage_start_multi: '&a[Oage-chan] &f"Group it is! I''ll prepare {theme} ({tier})!"'
  oage_start_single: '&a[Oage-chan] &f"Solo it is! I''ll prepare {theme} ({tier})!"'
  trap_triggered: '&6Oage-chan: &f"Oops, caught again? You gotta be careful!"'
  dungeon_closing: '&cThis dungeon will vanish shortly...'
  tiers:
    BROKEN: Tattered
    WORN: Worn-out
    FADED: Faded
    NEW: Brand New
  theme:
    test:
      name: Test
      description: A test dungeon used for debugging.
      oage_messages:
      - Looks like this one is just a test!
    cave:
      name: Cave
      description: A cave spreading in every direction. Watch your footing on the many ledges.
      oage_messages:
      - This cave stretches up, down, left, and right. You might need ladders to climb.
      - There are lots of ledges here, so be careful not to lose your footing!
    mineshaft:
      name: Mineshaft
      description: An abandoned mineshaft likely dug out by ancient people. What can be mined in this strange dimension?
      oage_messages:
      - This mineshaft looks like a place ancient people once excavated.
      - Maybe you can find some unusual ores in the rift between dimensions...?
    library:
      name: Library
      description: A quiet library where vast knowledge sleeps.
      oage_messages:
      - Keep it down... there are books everywhere!
    ruin:
      name: Ruins
      description: Ruins left behind by ancient people. I wonder how they ever lived in such a maze-like place.
      oage_messages:
      - These look like ruins. I bet people used to live here once...
      - I wonder what life in another dimension was like...?
    see_of_trees:
      name: Sea of Trees
      description: A dense forest where thick trees block your view in every direction.
      oage_messages:
      - So many trees... it feels easy to get lost in here!
    maze:
      name: 3D Maze
      description: A labyrinth-like space built from complex, intertwined paths.
      oage_messages:
      - Whoa... this place makes my head spin just looking at it!
  sizes:
    small: Small
    medium: Medium
    large: Large
    huge: Huge
