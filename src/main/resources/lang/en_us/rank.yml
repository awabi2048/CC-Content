rank:
  gui:
    tree_button: '&aSkill Tree'
    tree_button_lore:
    - '&7Open the skill tree'
    - '&eClick to open'
    settings_button: '&7Settings'
    settings_button_lore:
    - '&7Change profession options'
    - '&eClick to open'
    settings_title: '&8Profession Settings'
    settings:
      back: '&cBack'
      back_lore: '&7Return to profession main menu'
      bossbar:
        title: '&6Boss bar on EXP gain'
        current: '&f| &7Current {value}'
        action: '&f| &7Click to switch'
        mode:
          short: Show short
          long: Show long
          hidden: Hidden
      level_up:
        title: '&bLevel-up notification'
        current: '&f| &7Current {value}'
        action: '&f| &7Click to switch'
        enabled: Enabled
        disabled: Disabled
    hint_button: '&7Profession hint'
    hint_button_lore:
    - '&cCurrently in preparation'
  skill:
    usage: '&cUsage: /rank skill'
    player_only: '&cThis command can only be executed by a player'
    gui:
      title: '&8{profession} Skill Tree'
      no_profession: '&cYou have not selected a profession'
      tree_not_found: '&cSkill tree for {profession} was not found'
      start_not_found: '&cStart skill was not found'
      status:
        prestige_unlocked: '&dPrestige'
        acquired: '&aAcquired'
        available: '&eAvailable'
        locked: '&cLocked'
      lore:
        required_level: '&7Required Lv: &e{level}'
        current_level: '&7Current Lv: &e{level}'
        status: '&7Status: {status}'
        prestige_available: '&dPrestige skill available'
      route:
        prev: Go Back
        next: Go Forward
      dialog:
        title: '&6Confirm Skill Unlock'
        body: '&fUnlock {skill}? &7You cannot proceed to the other branch after this choice.'
        confirm: '&aUnlock'
        cancel: '&cCancel'
      unlock:
        success: '&aUnlocked skill: {skill}'
        already: '&eAlready unlocked: {skill}'
        missing_prerequisite: '&cMissing prerequisite skills: {skills}'
        level_shortage: '&cLevel requirement not met (required: {required}, current: {current})'
        branch_locked: '&cThis branch is locked because the other branch was already chosen'
        failed: '&cFailed to unlock skill'
      prestige:
        dialog:
          title: '&dConfirm Prestige Skill'
          body: '&fUnlock prestige skill {skill}?'
        unlock:
          success: '&dUnlocked prestige skill: {skill}'
          failed: '&cFailed to unlock prestige skill'
  tutorial_task_info:
    usage: '§cUsage: /rank task-info <player>'
    player_not_found: §cPlayer not found
    system_not_initialized: §cTask system is not initialized
    opened_for_player: §aOpened task GUI for {player}
    title: §6{player} §7- §e{rank}
    complete_title: §a§lAll tasks complete!
    complete_lore: §7There are no additional requirements for this rank
    category:
      play_time: §ePlay Time
      combat: '{status} §bCombat'
      mining: '{status} §bMining'
      vanilla_exp: §eVanilla EXP
      items: '{status} §bItems'
    line:
      progress_time: '{status} §7Progress: {current} / {required}'
      progress_exp: '{status} §7Progress: {current}/{required}'
      percent: §8({percent}%)
      target_prefix: '{status} '
      target_suffix: '§7: {current}/{required}'
  prestige:
    cannot: §cプレステージ条件を満たしていません。
    failed: §cプレステージの実行に失敗しました
    dialog:
      first:
        title: §d§lプレステージの確認 (1/2)
        body: '§f{profession} のプレステージレベル {level} でプレステージを実行します。


          §c§l注意: プレステージを実行すると、通常レベル、スキル、経験値がリセットされます。'
      second:
        title: §d§lプレステージの最終確認 (2/2)
        body: '§c本当にプレステージを実行しますか？


          §f職業: {profession}

          §fプレステージレベル: {level}


          §7§o※思念アイテムを獲得し、プレステージスキルが使用可能になります'
message:
  rank_up: §a§l【ランクアップ！】§r§a{rank} になりました
  profession_selected: §a§l【職業選択】§r§a職業 {profession} を選択しました
  profession_changed: §a§l【職業変更】§r§a職業を {profession} に変更しました
  skill_acquired: §a§l【スキル習得】§r§a{skill} を習得しました
  experience_gained: §b経験値を {experience} 獲得しました
  tutorial_rankup:
  - §6§l==========================================
  - §a§lランクアップ！
  - §f{old_rank} → {new_rank}
  - §6§l==========================================
party:
  create:
    success: '{prefix} &aパーティ "{name}" を作成しました！'
  join:
    success: '{prefix} &aパーティに参加しました！'
    broadcast: '{prefix} &7[&bパーティ&7] &6{player} &7がパーティに参加しました。'
  leave:
    success: '{prefix} &aパーティを抜けました。'
    broadcast: '{prefix} &7[&bパーティ&7] &6{player} &7がパーティを抜けました。'
  disband:
    leader_left: '{prefix} &cリーダーが抜けたため、パーティは解散されました。'
    success: '{prefix} &aパーティを解散しました。'
  invite:
    success: '{prefix} &6{player} &aを招待しました。'
    received: '{prefix} &6{player} &7からパーティへの招待が届きました！'
    click_to_join: '&7クリックして参加: &a/party join {party}'
  kick:
    success: '{prefix} &6{player} &aを追放しました。'
    kicked: '{prefix} &cパーティから追放されました。'
  list:
    header: '&6=== パーティメンバー ({count}) ==='
    leader: '&7リーダー: &e{leader}'
    member: '&7- {member}'
  chat:
    format: '{prefix} &7[&bパーティ&7] {message}'
  error:
    already_in_party: '{prefix} &cすでにパーティに入っています。'
    not_in_party: '{prefix} &cパーティに入っていません。'
    not_leader: '{prefix} &cリーダーのみが {action} できます。'
    player_not_found: '{prefix} &cプレイヤーが見つかりません。'
    not_party_leader: '{prefix} &cそのプレイヤーはパーティリーダーではありません。'
    not_invited: '{prefix} &c招待されていません。'
    already_member: '{prefix} &cすでにパーティメンバーです。'
    not_member: '{prefix} &cそのプレイヤーはパーティメンバーではありません。'
    cannot_kick_self: '{prefix} &c自分自身を追放することはできません。'
    specify_name: '{prefix} &c{action} するプレイヤー名を指定してください。'
    specify_party_name: '{prefix} &c参加するパーティのリーダー名を指定してください。'
