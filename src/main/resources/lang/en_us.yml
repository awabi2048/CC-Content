sukima_dungeon:
  # SukimaDungeon English Language File
  # Recreated from original SukimaDungeon plugin
  
  # Prefix
  prefix: "§7[§dSukimaDungeon§7]"
  
  # Compass
  compass:
    activate: "§bWorld Sprout Compass [Tier %1] activated (§a%2 seconds§b)"
    deactivate: "§cCompass deactivated"
    detected: "§aWorld Sprout detected! §7Distance: §e%1m §7Direction: §6%2"
    cooldown: "§cCooldown: §e%1 seconds remaining"
    no_sprouts: "§cNo World Sprouts nearby"
  
  # Talisman
  talisman:
    use: "§6Oage-chan's Talisman§7 used"
    escape: "§d§lEscape!"
    cancelled: "§cEscape cancelled"
  
  # Sprout
  sprout:
    harvest: "§aWorld Sprout harvested"
  
  # Error messages
  error:
    not_in_dungeon: "§cCan only be used inside SukimaDungeon"
    no_permission: "§cNo permission"
    generic: "§cAn error occurred"
  
  # GUI messages
  gui:
