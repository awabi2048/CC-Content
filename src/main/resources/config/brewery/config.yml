config_version: 3

brewery:
  quality:
    over_distillation_penalty: 5
    maximum_over_distillation_runs: 3
    maximum_over_aging_penalty: 20

  distillation:
    filter_speed_bonus: 0.15

  aging:
    real_seconds_per_unit: 1200
    small_barrel_speed_multiplier: 1.25
    large_barrel_speed_multiplier: 1.0
    small_barrel_loss_percent_per_target_unit: 1.0
    small_barrel_loss_cap_percent: 25.0

  barrel:
    fermentation_sign_keyword: "[ferment]"
    aging_sign_keyword: "barrel"
    fermentation_capacity: 3
    open_large_everywhere: true

  intoxication:
    schema_version: 2
    nausea_threshold: 25.0
    stumble_threshold: 50.0
    faint_threshold: 90.0
    decay_per_second: 0.05
    faint_duration_seconds: 8
    state_retention_seconds: 604800

  state:
    flush_interval_ticks: 100

  rank_exp:
    fermentation_batch: 10
    distillation_batch: 20
    aging_per_bottle: 10
