config_version: 1

bgm:
  target_state_switch_threshold_seconds: 10
  normal:
    key: "kota_server:ost_3.sukima_dungeon"
    bpm: 120
    loop_beats: 384
    switch_interval_beats: 8
    pitch: 1.0
  combat:
    key: "kota_server:ost_4.arena"
    bpm: 140
    loop_beats: 384
    switch_interval_beats: 8
    pitch: 1.0
  lobby:
    key: "kota_server:ost_3.sukima_dungeon"
    bpm: 120
    loop_beats: 384
    switch_interval_beats: 8
    pitch: 0.8409

multiplayer:
  join_grace_seconds: 45
  join_marker_search_radius: 16.0
  invite_auto_decline_distance: 16.0
  stage_build_steps_per_tick: 1

entrance_lift:
  interval_ticks: 10
  transfer_rise_blocks: 10
  max_rise_blocks: 17

session:
  max_concurrent: 3

# Arena難易度は、全プレイヤーの直近クリア履歴を日次で指数減衰し、活動量で集約した目標難易度を使う。
# clear_count はクリア1回、duration はプレイ時間1時間の活動量への重み。
# difficulty は観測したクリア難易度を候補中心へ引き寄せる強度、influence_strength は目標近傍を選ぶ強度。
# max_age_days は90以下、各重みと強度は有限の0以上で指定する。
difficulty_demand:
  half_life_days: 30.0
  max_age_days: 90
  weights:
    clear_count: 1.0
    difficulty: 1.0
    duration: 0.25
  influence_strength: 1.0

world_pool:
  size: 3
  cleanup_blocks_per_tick: 300

down:
  revive_hold_seconds: 3
  revive_radius: 2.5
  shulker_follow_interval_ticks: 2

mob_spawn:
  system_max_alive: 128

door_animation:
  total_ticks: 40
  sound:
    key: "minecraft:block.iron_door.open"
    pitch: 1.0

world_settings:
  view_distance: 6
  simulation_distance: 4
  send_view_distance: -1

