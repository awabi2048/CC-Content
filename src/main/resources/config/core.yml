# CC-Content Root Config

content_enabled:
  arena: true
  rank: true
  brewery: true
  cooking: true
  sukima_dungeon: true

persistence:
  flush_interval_minutes: 1

sukima_dungeon:
  sizes:
    small:
      tiles: 3
      duration: 900
      npc_base_count: 2
      sprout_base_count: 1
    medium:
      tiles: 5
      duration: 1800
      npc_base_count: 5
      sprout_base_count: 3
    large:
      tiles: 7
      duration: 2700
      npc_base_count: 8
      sprout_base_count: 5
    huge:
      tiles: 9
      duration: 3600
      npc_base_count: 12
      sprout_base_count: 8

  mob_scaling:
    amplification_ratio: 0.05

  miniboss_chance: 0.1
  rest_chance: 0.1

  spawn_rates:
    MOB: 0.5
    ITEM: 0.4

  mob_spawn:
    spawn_range: 24.0
    despawn_range: 32.0

  mob_detection:
    normal_range: 16.0
    sneak_range: 8.0

  generator_cells_per_tick: 5

  npc_count_variation: 0.2
  sprout_count_variation: 0.2

  marker_search_radius_y: 20.0
  sprout_per_tile: 0.1

  restricted_commands:
    - "tp"
    - "teleport"
    - "spawn"
    - "home"
    - "sethome"
    - "warp"

  bookmark_blacklist_worlds:
    - "world_the_end"

  bookmark_portal_duration: 300

  oage_message_sound: "entity.villager.ambient"
  oage_message_prefix: "§e【おあげちゃん】§r"

  compass:
    max_radius_particle: "flame"
    current_radius_particle: "soul_fire_flame"
    radius: 48.0
    time:
      tier1: 30
      tier2: 20
      tier3: 10
    cooldown:
      tier1: 60
      tier2: 40
      tier3: 20

  bgm:
    default:
      key: "kota_server:ost_3.sukima_dungeon"
      duration: 192

  world_settings:
    view_distance: 6
    simulation_distance: 4
    send_view_distance: -1

arena:
  bgm:
    normal:
      key: "kota_server:ost_3.sukima_dungeon"
      bpm: 120
      loop_beats: 384
      switch_beats: [8, 16, 24, 32, 40, 48, 56, 64, 72, 80, 88, 96, 104, 112, 120, 128, 136, 144, 152, 160, 168, 176, 184, 192, 200, 208, 216, 224, 232, 240, 248, 256, 264, 272, 280, 288, 296, 304, 312, 320, 328, 336, 344, 352, 360, 368, 376, 384]
    combat:
      key: "kota_server:ost_4.arena"
      bpm: 140
      loop_beats: 384
      switch_beats: [8, 16, 24, 32, 40, 48, 56, 64, 72, 80, 88, 96, 104, 112, 120, 128, 136, 144, 152, 160, 168, 176, 184, 192, 200, 208, 216, 224, 232, 240, 248, 256, 264, 272, 280, 288, 296, 304, 312, 320, 328, 336, 344, 352, 360, 368, 376, 384]
  quest:
    generate_count: 14
  multiplayer:
    join_grace_seconds: 45
    join_marker_search_radius: 16.0
    stage_build_steps_per_tick: 1
  down:
    revive_hold_seconds: 3
    revive_radius: 2.5
    shulker_follow_interval_ticks: 2
  lobby:
    world: ""
    x: 0.0
    y: 64.0
    z: 0.0
    yaw: 0.0
    pitch: 0.0
  mob_spawn:
    system_max_alive: 128
  door_animation:
    total_ticks: 60
  barrier_restart:
    default_duration_seconds: 30
    corruption_ratio_base: 0.05
  quest_charactor_config:
    none:
      weight: 70
      spawn_interval_multiplier: 1.0
      max_summon_count_multiplier: 1.0
      clear_mob_count_multiplier: 1.0
      mob_stats_multiplier:
        health: 1.0
        attack: 1.0
    legion:
      weight: 15
      spawn_interval_multiplier: 0.5
      max_summon_count_multiplier: 1.5
      clear_mob_count_multiplier: 1.5
      mob_stats_multiplier:
        health: 0.75
        attack: 0.75
    elite:
      weight: 15
      spawn_interval_multiplier: 0.5
      max_summon_count_multiplier: 0.75
      clear_mob_count_multiplier: 0.75
      mob_stats_multiplier:
        health: 1.5
        attack: 1.5
  world_settings:
    view_distance: 6
    simulation_distance: 4
    send_view_distance: -1

rank:
  combat_exp:
    health_multiplier: 0.1
