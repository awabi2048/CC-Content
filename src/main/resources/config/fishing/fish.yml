config_version: 4
enabled: true

wait_time:
  min_ticks: 100
  max_ticks: 600

minigame:
  hook_window_ticks: 30
  fight_duration_ticks: 200
  fight_interval_ticks: 1
  green_width: 10
  yellow_margin: 20
  input_step: 3
  initial_effectiveness: 50
  status_message_ticks: 60
  lure_reduction_per_level: 0.2
  resistance_smoothing: 0.25
  lateral_smoothing: 0.18
  visual_forward_range: 2.5
  visual_lateral_range: 1.6
  facing_bonus_multiplier: 1.5

rod:
  standard:
    power_multiplier: 1.25
    finesse_multiplier: 1.15
    max_durability: 128

bait:
  consume_on_valid_session: true
  definitions:
    worm:
      material: STRING
      wait_time_multiplier: 0.85
      rare_catch_multiplier: 1.0
      quality_multiplier: 1.0
    lucky_worm:
      material: GLOW_INK_SAC
      wait_time_multiplier: 0.95
      rare_catch_multiplier: 1.6
      quality_multiplier: 1.35
    deep_sea_bait:
      material: NAUTILUS_SHELL
      wait_time_multiplier: 1.1
      rare_catch_multiplier: 2.0
      quality_multiplier: 1.5
      special_tags: [ancient]

fish:
